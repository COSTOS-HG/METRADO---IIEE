<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metrado IIEE</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  body{font-family:Segoe UI,system-ui,Arial,sans-serif;margin:0;background:#eef1f6;color:#0f1b2d}
  .wrap{padding:16px}
  h1{font-size:15px;margin:0 0 2px}
  .sub{font-size:11px;color:#3a4a61;margin-bottom:14px}
  .card{background:#fff;border:1px solid #e7ecf3;border-radius:10px;padding:14px;margin-bottom:12px}
  button{background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:10px 14px;font:inherit;font-weight:700;cursor:pointer;width:100%}
  button:hover{background:#163a9e}
  .status{font-size:12px;color:#3a4a61;margin-top:10px;min-height:16px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#9aa6b6;margin-right:6px;vertical-align:middle}
  .dot.on{background:#0f8a4d}
  .hint{font-size:11px;color:#6b7890;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <h1>Metrado IIEE</h1>
  <div class="sub">Ventana flotante &middot; escribe en la hoja RED</div>
  <div class="card">
    <button id="btnOpen">Abrir ventana de Metrado</button>
    <div class="status"><span class="dot" id="dot"></span><span id="st">Iniciando&hellip;</span></div>
    <div class="hint">Este panel es solo el ayudante. Trabaja en la ventana flotante; al cerrarla ver&aacute;s el resultado en la hoja RED. Si cierras este panel, la ventana se cierra tambi&eacute;n.</div>
  </div>
</div>
<script>
const NIVELES = ['INICIAL','PRIMARIA','SECUNDARIA','EXTERIOR'];

function toast(){}
let _writing=false, _writePending=null;
async function writeAoaToExcel(aoa, colKeys, opts){
  opts = opts || {};
  const doActivate = opts.activate !== false;
  const quiet = opts.quiet === true;
  if(_writing){ _writePending={aoa:aoa, colKeys:colKeys, opts:opts}; return; }
  _writing=true;
  try{
    await Excel.run(async (ctx)=>{
      const sheets=ctx.workbook.worksheets;
      let ws=sheets.getItemOrNullObject('RED');
      ws.load('name');
      await ctx.sync();
      if(ws.isNullObject){ ws=sheets.add('RED'); }
      const used=ws.getUsedRangeOrNullObject();
      used.load('rowCount');
      await ctx.sync();
      if(!used.isNullObject){ used.clear(Excel.ClearApplyTo.all); }
      const ncols=Math.max(1, ...aoa.map(r=>r.length));
      const data=aoa.map(r=>{
        const row=r.slice();
        while(row.length<ncols) row.push('');
        return row.map(v=> v==null ? '' : v);
      });
      if(!data.length){ if(doActivate){ ws.activate(); } await ctx.sync(); return; }

      const rngAll=ws.getRangeByIndexes(0,0,data.length,ncols);
      rngAll.values=data;

      // paleta tomada del propio HTML
      const C={ navy:'#0f1b2d', bloque:'#26456f', accent:'#1d4ed8', accentD:'#163a9e',
                tablero:'#dbe6f6', light:'#eaf1fc', sub:'#f3f6fb', meta:'#f7f9fc',
                total:'#dbe6f6', border:'#c7d0dd', white:'#ffffff', ink2:'#3a4a61' };

      // anchos de columna fijos (puntos)
      ws.getRangeByIndexes(0,0,1,1).format.columnWidth=92;
      ws.getRangeByIndexes(0,1,1,1).format.columnWidth=300;
      ws.getRangeByIndexes(0,2,1,1).format.columnWidth=48;
      for(let cc=3; cc<ncols; cc++){ ws.getRangeByIndexes(0,cc,1,1).format.columnWidth=74; }

      // bordes finos en toda la tabla
      ['EdgeTop','EdgeBottom','EdgeLeft','EdgeRight','InsideHorizontal','InsideVertical'].forEach(ed=>{
        const b=rngAll.format.borders.getItem(ed); b.style='Continuous'; b.weight='Thin'; b.color=C.border;
      });

      // formato numerico + alineacion a la derecha en columnas de metrado (col D en adelante)
      if(ncols>3){
        rngAll.numberFormat=data.map(row=>row.map((v,ci)=> ci>=3 ? '0.00' : 'General'));
        ws.getRangeByIndexes(0,3,data.length,ncols-3).format.horizontalAlignment='Right';
      }

      // estilo por tipo de fila (se detecta por contenido)
      const NIV=(typeof NIVELES!=='undefined')?NIVELES:[];
      const rowR=(i)=>ws.getRangeByIndexes(i,0,1,ncols);
      const cellR=(i,c)=>ws.getRangeByIndexes(i,c,1,1);
      for(let i=0;i<data.length;i++){
        const r=data[i];
        const c0=String(r[0]||''), c1=String(r[1]||''), c2=String(r[2]||'');
        const filled=r.filter(x=>x!=='' && x!=null).length;
        let t='data';
        if(i===0) t='title';
        else if(c0==='PROYECTO:'||c0==='DPTO:') t='meta';
        else if(filled===0) t='blank';
        else if(c0==='TABLERO' && c1==='DESCRIPCIÓN DEL CIRCUITO') t='thead';
        else if(c0==='TOTAL') t='total';
        else if(c0.indexOf('TABLERO DE DISTRIBUCIÓN')===0) t='tabtitle';
        else if(c2==='# Cond') t='circ';
        else if(c1==='PROYECCIÓN HORIZONTAL'||c1==='MONTANTE') t='sub';
        else if(filled===1 && c0) t=(NIV.indexOf(c0)>=0)?'nivel':'bloque';

        if(t==='title'){ const R=rowR(i); R.format.fill.color=C.navy; R.format.font.color=C.white; R.format.font.bold=true; R.format.font.size=13; }
        else if(t==='meta'){ const R=rowR(i); R.format.fill.color=C.meta; cellR(i,0).format.font.bold=true; if(r[3]) cellR(i,3).format.font.bold=true; }
        else if(t==='nivel'){ const R=rowR(i); R.format.fill.color=C.navy; R.format.font.color=C.white; R.format.font.bold=true; R.format.font.size=12; }
        else if(t==='bloque'){ const R=rowR(i); R.format.fill.color=C.bloque; R.format.font.color=C.white; R.format.font.bold=true; }
        else if(t==='tabtitle'){ const R=rowR(i); R.format.fill.color=C.tablero; R.format.font.color=C.accentD; R.format.font.bold=true; }
        else if(t==='thead'){ const R=rowR(i); R.format.fill.color=C.accent; R.format.font.color=C.white; R.format.font.bold=true; R.format.horizontalAlignment='Center'; R.format.wrapText=true; }
        else if(t==='circ'){ const R=rowR(i); R.format.fill.color=C.light; const a=cellR(i,0); a.format.fill.color=C.accent; a.format.font.color=C.white; a.format.font.bold=true; a.format.horizontalAlignment='Center'; const b=cellR(i,1); b.format.font.bold=true; b.format.font.color=C.accentD; }
        else if(t==='sub'){ const R=rowR(i); R.format.fill.color=C.sub; R.format.font.italic=true; R.format.font.bold=true; R.format.font.color=C.ink2; }
        else if(t==='total'){ const R=rowR(i); R.format.fill.color=C.total; R.format.font.bold=true; }
      }

      rngAll.format.verticalAlignment='Center';
      if(doActivate){ ws.activate(); }
      await ctx.sync();
    });
    if(!quiet) toast('Metrado escrito en la hoja RED ✓');
  }catch(e){
    console.error(e);
    if(!quiet) toast('Error al escribir en Excel: '+(e.message||e));
  } finally {
    _writing=false;
    if(_writePending){ const p=_writePending; _writePending=null; writeAoaToExcel(p.aoa,p.colKeys,p.opts); }
  }
}

const APP_URL="https://costos-hg.github.io/METRADO---IIEE/app.html?dlg=1";
let _dialog=null;
function setStatus(txt,on){ const st=document.getElementById('st'); if(st) st.textContent=txt; const d=document.getElementById('dot'); if(d) d.className='dot'+(on?' on':''); }
function loadDBStr(){ try{ return Office.context.document.settings.get('metradoDB')||''; }catch(e){ return ''; } }
function saveDBStr(srt){ try{ Office.context.document.settings.set('metradoDB', srt); Office.context.document.settings.saveAsync(); }catch(e){} }

function onDialogMessage(arg){
  let m; try{ m=JSON.parse(arg.message); }catch(e){ return; }
  if(m.type==='ready'){
    if(_dialog){ try{ _dialog.messageChild(JSON.stringify({type:'init', db:loadDBStr()})); }catch(e){} }
  } else if(m.type==='data'){
    if(m.db!=null) saveDBStr(m.db);
    if(m.aoa && m.aoa.length) writeAoaToExcel(m.aoa, m.colKeys||[], {activate:false, quiet:true});
  }
}
function onDialogEvent(arg){ _dialog=null; setStatus('Ventana cerrada', false); }

function openDialog(){
  setStatus('Abriendo ventana…', false);
  Office.context.ui.displayDialogAsync(APP_URL, {height:92, width:92, displayInIframe:true}, function(res){
    if(res.status!==Office.AsyncResultStatus.Succeeded){
      setStatus('No se pudo abrir: '+((res.error&&res.error.message)||''), false); return;
    }
    _dialog=res.value;
    setStatus('Ventana abierta', true);
    _dialog.addEventHandler(Office.EventType.DialogMessageReceived, onDialogMessage);
    _dialog.addEventHandler(Office.EventType.DialogEventReceived, onDialogEvent);
  });
}

Office.onReady(function(){
  document.getElementById('btnOpen').onclick=openDialog;
  openDialog();
});
</script>
</body>
</html>
